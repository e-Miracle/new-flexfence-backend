# Host-level nginx (TLS termination) for all FlexFence services on one server.
# Install to e.g. /etc/nginx/sites-available/flexfence.conf and symlink into sites-enabled.

map $http_upgrade $connection_upgrade {
  default upgrade;
  '' close;
}

server {
  listen 443 ssl http2;
  server_name flexfence.app www.flexfence.app;

  ssl_certificate     /etc/letsencrypt/live/flexfence.app/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/flexfence.app/privkey.pem;

  location / {
    proxy_pass http://127.0.0.1:3000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}

server {
  listen 443 ssl http2;
  server_name app.flexfence.app;

  ssl_certificate     /etc/letsencrypt/live/flexfence.app/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/flexfence.app/privkey.pem;

  location / {
    proxy_pass http://127.0.0.1:3001;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}

server {
  listen 443 ssl http2;
  server_name api.flexfence.app;

  ssl_certificate     /etc/letsencrypt/live/flexfence.app/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/flexfence.app/privkey.pem;

  client_max_body_size 20m;

  location / {
    proxy_pass http://127.0.0.1:3002;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
  }
}

server {
  listen 80;
  server_name flexfence.app www.flexfence.app app.flexfence.app api.flexfence.app;
  return 301 https://$host$request_uri;
}
