name: Backend Deploy

# Production deploy: copy source to the server and build/run with local Docker (no registry).
on:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: deploy-flexfence-backend
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Pack source for server
        working-directory: ${{ github.workspace }}
        run: |
          tar -czf deploy.tar.gz \
            --warning=no-file-changed \
            --exclude=deploy.tar.gz \
            --exclude=.git \
            --exclude=node_modules \
            --exclude=dist \
            --exclude=.env \
            --exclude='*.md' \
            .
          if [ ! -s deploy.tar.gz ]; then
            echo "deploy.tar.gz is missing or empty" >&2
            exit 1
          fi
          ls -lh deploy.tar.gz

      - name: Ensure deploy directory on server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          envs: DEPLOY_APP_DIR
          script: mkdir -p "${DEPLOY_APP_DIR:-/opt/flexfence/backend}"
        env:
          DEPLOY_APP_DIR: ${{ secrets.DEPLOY_APP_DIR }}

      - name: Copy bundle to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: deploy.tar.gz
          target: /opt/flexfence/backend
          overwrite: true

      - name: Build and run on server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          envs: DEPLOY_APP_DIR
          script: |
            set -euo pipefail
            APP_DIR="${DEPLOY_APP_DIR:-/opt/flexfence/backend}"
            cd "$APP_DIR"
            if [ ! -f .env ]; then
              echo "Missing ${APP_DIR}/.env — create it on the server before deploy." >&2
              exit 1
            fi
            tar -xzf deploy.tar.gz
            rm -f deploy.tar.gz
            docker compose -f docker-compose.prod.yml build
            docker compose -f docker-compose.prod.yml up -d --remove-orphans
            docker image prune -f
        env:
          DEPLOY_APP_DIR: ${{ secrets.DEPLOY_APP_DIR }}
